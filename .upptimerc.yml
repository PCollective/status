# Partner Partner — Upptime configuration
# Docs: https://upptime.js.org/docs/configuration

owner: PCollective
repo: status

sites:
  - name: Partner Partner App
    url: https://app.yourpartnerpartner.com
  - name: Website
    url: https://yourpartnerpartner.com
  - name: Fractional Partners
    url: https://partners.yourpartnerpartner.com
  - name: Mantle Connect Bridge
    url: https://connect.yourpartnerpartner.com
  - name: Migration Center
    url: https://migrate.yourpartnerpartner.com

status-website:
  cname: status.yourpartnerpartner.com
  name: Partner Partner Status
  introTitle: "**Partner Partner** service status"
  introMessage: Live availability and uptime for Partner Partner services. This page updates automatically every few minutes.
  navbar:
    - title: Status
      href: /
    - title: Partner Partner
      href: https://yourpartnerpartner.com
  theme: light
  # Partner Partner brand palette applied via Upptime's CSS variables
  css: |
    :root {
      --body-background-color: #FFFCF6;
      --body-text-color: #3D2C17;
      --card-background-color: #FFFFFF;
      --nav-background-color: #FFFCF6;
      --link-color: #1501FF;
    }

# Uptime is checked every 5 minutes via GitHub Actions.
# A site is "down" after the request fails or exceeds the max response time.
assignees:
  - p-collective25
